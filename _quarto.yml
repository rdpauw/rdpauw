project:
  type: website

website:
  title: "Robby De Pauw"

format:
  html:
    theme: none
    css: styles.css
    toc: false
    page-layout: full
    smooth-scroll: true
  pdf:
    papersize: a4
    geometry:
      - margin=1.8cm
    fontsize: 10pt
    colorlinks: true
    linkcolor: RoyalBlue
    urlcolor: RoyalBlue
    pdf-engine: xelatex
    output-file: "Robby-De-Pauw-CV"
    # TikZ powers the rounded-corner clip on the profile photo in the PDF.
    include-in-header:
      text: |
        \usepackage{tikz}

# Don't auto-inject Quarto's format switcher; the masthead has its own PDF link.
format-links: false

execute:
  echo: false
  warning: false
  message: false
  freeze: auto